name: frontend
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  riverpod: ^2.4.9
  flutter_riverpod: ^2.4.9

  # Networking
  dio: ^5.4.0

  # Local Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # UI
  google_fonts: ^6.1.0
  pinput: ^4.0.0
  flutter_localizations:
    sdk: flutter

  # Validation
  email_validator: ^3.0.0

  # Others
  intl: ^0.20.2

  # Live tracking
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.1
  socket_io_client: ^2.0.3+1

  # Contact driver (tel:/sms: links)
  url_launcher: ^6.3.1

  # Payments
  webview_flutter: ^4.10.0

  # Reports
  pdf: ^3.11.1
  printing: ^5.13.1

  # Profile picture picker
  image_picker: ^1.1.2

  # AI Chatbot - Markdown rendering for assistant replies
  markdown_widget: ^2.3.2+6

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0


flutter:
  uses-material-design: true

